name: Enforce Org Rulesets

on:
  workflow_dispatch:
  schedule:
    - cron: "22 * * * *"
  push:
    branches:
      - main
    paths:
      - "policies/org-rulesets/**"
      - "scripts/sync-org-rulesets.sh"
      - ".github/workflows/enforce-org-rulesets.yml"

permissions:
  contents: read

jobs:
  sync:
    runs-on: ubuntu-latest
    environment: org-policy
    env:
      ORG_NAME: sima-neat
      ORG_ADMIN_TOKEN: ${{ secrets.ORG_ADMIN_TOKEN != '' && secrets.ORG_ADMIN_TOKEN || secrets.GH_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Validate required secret
        run: |
          if [[ -z "${ORG_ADMIN_TOKEN}" ]]; then
            echo "Missing secret. Set ORG_ADMIN_TOKEN or GH_TOKEN in environment org-policy."
            echo "Token must be allowed to administer organizations in this org."
            exit 1
          fi

      - name: Sync org rulesets
        run: ./scripts/sync-org-rulesets.sh

