name: Validate Access Policy

on:
  workflow_dispatch:
  pull_request:
    paths:
      - "policies/access/**"
      - "scripts/report-access-policy.py"
      - ".github/workflows/validate-access-policy.yml"
  push:
    branches:
      - main
    paths:
      - "policies/access/**"
      - "scripts/report-access-policy.py"
      - ".github/workflows/validate-access-policy.yml"

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Validate access policy
        run: python3 scripts/report-access-policy.py

