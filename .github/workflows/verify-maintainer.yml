name: Verify Maintainer Authorization

on:
  workflow_call:
    inputs:
      allowed_permissions:
        description: Comma-separated repository permission levels allowed to continue.
        required: false
        type: string
        default: admin,maintain
    outputs:
      permission:
        description: Permission level detected for the workflow actor.
        value: ${{ jobs.verify-maintainer.outputs.permission }}

permissions:
  contents: read

jobs:
  verify-maintainer:
    name: Verify maintainer permission
    runs-on: ubuntu-latest
    outputs:
      permission: ${{ steps.permission.outputs.permission }}

    steps:
      - name: Check actor repository permission
        id: permission
        env:
          GH_TOKEN: ${{ github.token }}
          ACTOR: ${{ github.actor }}
          REPO: ${{ github.repository }}
          ALLOWED_PERMISSIONS: ${{ inputs.allowed_permissions }}
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import json
          import os
          import sys
          import urllib.error
          import urllib.request

          actor = os.environ["ACTOR"]
          repo = os.environ["REPO"]
          token = os.environ["GH_TOKEN"]
          allowed = {
              item.strip()
              for item in os.environ["ALLOWED_PERMISSIONS"].split(",")
              if item.strip()
          }

          if not allowed:
              print("allowed_permissions must contain at least one permission level.", file=sys.stderr)
              sys.exit(1)

          req = urllib.request.Request(
              f"https://api.github.com/repos/{repo}/collaborators/{actor}/permission",
              headers={
                  "Accept": "application/vnd.github+json",
                  "Authorization": f"Bearer {token}",
                  "X-GitHub-Api-Version": "2022-11-28",
              },
          )

          try:
              with urllib.request.urlopen(req) as resp:
                  permission = json.loads(resp.read().decode("utf-8")).get("permission", "")
          except urllib.error.HTTPError as exc:
              body = exc.read().decode("utf-8", errors="replace")
              print(
                  f"Failed to resolve repository permission for actor {actor} in {repo}: "
                  f"HTTP {exc.code} {body}",
                  file=sys.stderr,
              )
              sys.exit(1)

          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as output:
              output.write(f"permission={permission}\n")

          if permission not in allowed:
              allowed_display = ", ".join(sorted(allowed))
              print(
                  f"Actor {actor} has repository permission '{permission}', "
                  f"but this workflow requires one of: {allowed_display}.",
                  file=sys.stderr,
              )
              sys.exit(1)

          print(f"Actor {actor} authorized with repository permission '{permission}'.")
          PY
