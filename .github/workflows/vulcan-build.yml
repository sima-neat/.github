name: vulcan-build

on:
  workflow_call:
    inputs:
      vulcan_env:
        description: Vulcan environment label override. Empty uses the caller repo or org VULCAN_ENV variable, then dev.
        required: false
        default: ""
        type: string
      sdk_cache:
        description: Vulcan SDK cache label, such as sdk-latest or sdk-2.1.
        required: false
        default: sdk-latest
        type: string
      runner_profile:
        description: Vulcan runner profile. Defaults to the current SDK runner behavior.
        required: false
        default: sdk
        type: string
      architecture:
        description: Vulcan runner architecture label.
        required: false
        default: arm64
        type: string
      cache:
        description: Optional generic cache label. For sdk, this overrides sdk_cache; for model-compiler, this selects the Model Compiler cache.
        required: false
        default: ""
        type: string
      capacity:
        description: "Vulcan capacity label: cheaper, cheap, default, expensive, or most-expensive."
        required: false
        default: default
        type: string
      working_directory:
        description: Directory under the checked-out repository where the build command runs.
        required: false
        default: "."
        type: string
      build_command:
        description: Build command to run inside the checked-out repository.
        required: false
        default: "./build.sh --all --clean"
        type: string
      pre_build_command:
        description: Optional shell command to run before build_command.
        required: false
        default: ""
        type: string
      post_build_command:
        description: Optional shell command to run after build_command.
        required: false
        default: ""
        type: string
      ensure_sdk_container:
        description: Run sima-cli sdk setup before the build.
        required: false
        default: true
        type: boolean
      sdk_setup_args:
        description: Arguments for sima-cli sdk setup when ensure_sdk_container is true.
        required: false
        default: "-y -n --minimal --workspace /mnt/vulcan/workspace --no-model-sdk --no-insight"
        type: string
      fetch_depth:
        description: Git checkout fetch depth. Use 0 when versioning depends on tags/history.
        required: false
        default: 1
        type: number
      checkout_submodules:
        description: Whether actions/checkout should fetch submodules.
        required: false
        default: recursive
        type: string
      artifact_name:
        description: Optional GitHub Actions artifact name to upload after build_command.
        required: false
        default: ""
        type: string
      artifact_path:
        description: Optional path or glob to upload after build_command.
        required: false
        default: ""
        type: string
      artifact_retention_days:
        description: Retention days for uploaded GitHub Actions artifacts.
        required: false
        default: 7
        type: number

permissions:
  contents: read
  packages: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  VULCAN_ENV: ${{ inputs.vulcan_env || vars.VULCAN_ENV || 'dev' }}
  VULCAN_RUNNER_PROFILE: ${{ inputs.runner_profile }}
  VULCAN_ARCHITECTURE: ${{ inputs.architecture }}
  VULCAN_CACHE: ${{ inputs.cache || inputs.sdk_cache }}
  SDK_CACHE: ${{ inputs.cache || inputs.sdk_cache }}
  VULCAN_CAPACITY: ${{ inputs.capacity }}
  VULCAN_WORKSPACE: /mnt/vulcan/workspace
  MODEL_COMPILER_CACHE_ROOT: /mnt/model-compiler

jobs:
  resolve-runner:
    name: Resolve Vulcan runner labels
    runs-on: ubuntu-latest
    outputs:
      labels: ${{ steps.resolve.outputs.labels }}
      profile: ${{ steps.resolve.outputs.profile }}
      architecture: ${{ steps.resolve.outputs.architecture }}
      cache: ${{ steps.resolve.outputs.cache }}

    steps:
      - name: Resolve labels
        id: resolve
        shell: bash
        env:
          VULCAN_ENV: ${{ inputs.vulcan_env || vars.VULCAN_ENV || 'dev' }}
          RUNNER_PROFILE: ${{ inputs.runner_profile }}
          ARCHITECTURE: ${{ inputs.architecture }}
          CAPACITY: ${{ inputs.capacity }}
          SDK_CACHE: ${{ inputs.sdk_cache }}
          CACHE: ${{ inputs.cache }}
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import json
          import os
          import re
          import sys

          profile = os.environ["RUNNER_PROFILE"].strip().lower()
          architecture = os.environ["ARCHITECTURE"].strip().lower()
          capacity = os.environ["CAPACITY"].strip().lower()
          vulcan_env = os.environ["VULCAN_ENV"].strip().lower()
          sdk_cache = os.environ["SDK_CACHE"].strip().lower()
          cache = os.environ["CACHE"].strip().lower()

          allowed_profiles = {"sdk", "ubuntu", "model-compiler"}
          allowed_architectures = {"arm64", "amd64"}
          label_pattern = re.compile(r"[a-z0-9][a-z0-9._-]*")
          if profile not in allowed_profiles:
              print(f"Unsupported runner_profile: {profile}", file=sys.stderr)
              sys.exit(1)
          if architecture not in allowed_architectures:
              print(f"Unsupported architecture: {architecture}", file=sys.stderr)
              sys.exit(1)
          if not label_pattern.fullmatch(capacity):
              print(f"Unsupported capacity label: {capacity}", file=sys.stderr)
              sys.exit(1)
          for name, value in (("sdk_cache", sdk_cache), ("cache", cache)):
              if value and not label_pattern.fullmatch(value):
                  print(f"Unsupported {name} label: {value}", file=sys.stderr)
                  sys.exit(1)

          effective_cache = cache
          if profile == "sdk":
              effective_cache = cache or sdk_cache
              if not effective_cache:
                  print("SDK profile requires a cache label.", file=sys.stderr)
                  sys.exit(1)
              # Keep the SDK profile's default labels exactly compatible with
              # existing Vulcan scaler behavior. The scaler can later map this
              # legacy label set into the internal sdk profile without forcing
              # every existing caller to update at once.
              labels = [
                  "self-hosted",
                  "linux",
                  architecture,
                  f"vulcan-{vulcan_env}",
                  "sdk-build",
                  effective_cache,
                  capacity,
              ]
          elif profile == "model-compiler":
              labels = [
                  "self-hosted",
                  "linux",
                  architecture,
                  f"vulcan-{vulcan_env}",
                  "model-compiler",
                  capacity,
              ]
              if effective_cache:
                  labels.append(effective_cache)
          else:
              labels = [
                  "self-hosted",
                  "linux",
                  architecture,
                  f"vulcan-{vulcan_env}",
                  "ubuntu",
                  capacity,
              ]

          github_output = os.environ["GITHUB_OUTPUT"]
          with open(github_output, "a", encoding="utf-8") as out:
              out.write(f"labels={json.dumps(labels, separators=(',', ':'))}\n")
              out.write(f"profile={profile}\n")
              out.write(f"architecture={architecture}\n")
              out.write(f"cache={effective_cache}\n")
          PY

  build:
    name: Build on Vulcan
    needs: resolve-runner
    environment: ${{ inputs.vulcan_env || vars.VULCAN_ENV || 'dev' }}
    runs-on: ${{ fromJSON(needs.resolve-runner.outputs.labels) }}
    env:
      VULCAN_RUNNER_PROFILE: ${{ needs.resolve-runner.outputs.profile }}
      VULCAN_ARCHITECTURE: ${{ needs.resolve-runner.outputs.architecture }}
      VULCAN_CACHE: ${{ needs.resolve-runner.outputs.cache }}
      SDK_CACHE: ${{ needs.resolve-runner.outputs.cache }}

    steps:
      - name: Prepare Vulcan workspace
        shell: bash
        run: |
          set -euo pipefail
          sudo install -d -o "$(id -un)" -g "$(id -gn)" -m 0775 "${VULCAN_WORKSPACE}"
          find "${VULCAN_WORKSPACE}" -mindepth 1 -maxdepth 1 -exec rm -rf {} +

      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: ${{ inputs.fetch_depth }}
          submodules: ${{ inputs.checkout_submodules }}

      - name: Stage checkout into Vulcan workspace
        shell: bash
        run: |
          set -euo pipefail
          find "${VULCAN_WORKSPACE}" -mindepth 1 -maxdepth 1 -exec rm -rf {} +
          tar -C "${GITHUB_WORKSPACE}" --exclude .git -cf - . | tar -C "${VULCAN_WORKSPACE}" -xf -
          test -f "${VULCAN_WORKSPACE}/README.md"

      - name: Inspect Vulcan runner
        shell: bash
        run: |
          set -euo pipefail
          echo "VULCAN_ENV=${VULCAN_ENV}"
          echo "VULCAN_RUNNER_PROFILE=${VULCAN_RUNNER_PROFILE}"
          echo "VULCAN_ARCHITECTURE=${VULCAN_ARCHITECTURE}"
          echo "VULCAN_CACHE=${VULCAN_CACHE}"
          echo "SDK_CACHE=${SDK_CACHE}"
          echo "VULCAN_CAPACITY=${VULCAN_CAPACITY}"
          uname -a
          id
          df -h
          if [[ "${VULCAN_RUNNER_PROFILE}" != "sdk" ]] && ! docker info >/dev/null 2>&1; then
            echo "Docker daemon is unavailable; it is optional for the ${VULCAN_RUNNER_PROFILE} runner profile."
          else
            docker version
            docker ps --format 'table {{.Names}}\t{{.Image}}\t{{.Status}}'
          fi
          if [[ "${VULCAN_RUNNER_PROFILE}" == "sdk" ]]; then
            test -x /mnt/vulcan/bin/sima-cli
            /mnt/vulcan/bin/sima-cli --version || /mnt/vulcan/bin/sima-cli version
          fi

      - name: Configure Model Compiler environment
        if: ${{ needs.resolve-runner.outputs.profile == 'model-compiler' }}
        shell: bash
        run: |
          set -euo pipefail
          venv="${MODEL_COMPILER_CACHE_ROOT}"
          if [[ ! -f "${venv}/bin/activate" ]]; then
            echo "Model Compiler virtual environment was not found at ${venv}." >&2
            exit 1
          fi
          echo "VIRTUAL_ENV=${venv}" >> "${GITHUB_ENV}"
          echo "${venv}/bin" >> "${GITHUB_PATH}"
          "${venv}/bin/python" - <<'PY'
          import sys
          print(sys.executable)
          PY

      - name: Ensure SDK container
        if: ${{ needs.resolve-runner.outputs.profile == 'sdk' && inputs.ensure_sdk_container }}
        shell: bash
        env:
          SDK_SETUP_ARGS: ${{ inputs.sdk_setup_args }}
        run: |
          set -euo pipefail
          cd "${VULCAN_WORKSPACE}"
          read -r -a sdk_setup_argv <<< "${SDK_SETUP_ARGS}"
          /mnt/vulcan/bin/sima-cli sdk setup "${sdk_setup_argv[@]}"
          docker ps --format 'table {{.Names}}\t{{.Image}}\t{{.Status}}'

      - name: Pre-build
        if: ${{ inputs.pre_build_command != '' }}
        shell: bash
        working-directory: ${{ env.VULCAN_WORKSPACE }}/${{ inputs.working_directory }}
        env:
          PRE_BUILD_COMMAND: ${{ inputs.pre_build_command }}
        run: |
          set -euo pipefail
          bash -lc "${PRE_BUILD_COMMAND}"

      - name: Build
        shell: bash
        working-directory: ${{ env.VULCAN_WORKSPACE }}/${{ inputs.working_directory }}
        env:
          BUILD_COMMAND: ${{ inputs.build_command }}
        run: |
          set -euo pipefail
          bash -lc "${BUILD_COMMAND}"

      - name: Post-build
        if: ${{ inputs.post_build_command != '' }}
        shell: bash
        working-directory: ${{ env.VULCAN_WORKSPACE }}/${{ inputs.working_directory }}
        env:
          POST_BUILD_COMMAND: ${{ inputs.post_build_command }}
        run: |
          set -euo pipefail
          bash -lc "${POST_BUILD_COMMAND}"

      - name: Upload build artifact
        if: ${{ inputs.artifact_name != '' && inputs.artifact_path != '' }}
        uses: actions/upload-artifact@v6
        with:
          name: ${{ inputs.artifact_name }}
          path: ${{ env.VULCAN_WORKSPACE }}/${{ inputs.artifact_path }}
          if-no-files-found: error
          retention-days: ${{ inputs.artifact_retention_days }}
