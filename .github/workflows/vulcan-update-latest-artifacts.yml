name: Vulcan Update Latest Artifacts

on:
  workflow_call:
    inputs:
      bucket:
        description: Vulcan artifact S3 bucket name.
        required: false
        default: ""
        type: string
      role_to_assume:
        description: AWS IAM role ARN to assume with GitHub OIDC.
        required: false
        default: ""
        type: string
      aws_region:
        description: AWS region for S3 and STS.
        required: false
        default: us-west-2
        type: string
      environment_name:
        description: GitHub environment name.
        required: false
        default: dev
        type: string
      artifact_folder:
        description: Optional folder inside the commit artifact directory.
        required: false
        default: ""
        type: string
      latest_tag:
        description: Value to write to latest.tag. Empty uses the current short commit SHA.
        required: false
        default: ""
        type: string
      validate_manifest:
        description: Require manifest.json to exist under repo/branch/folder before updating latest.tag.
        required: false
        default: true
        type: boolean
      install_awscli:
        description: Install AWS CLI v2 before updating S3.
        required: false
        default: false
        type: boolean
      sse_kms_key_id:
        description: Optional KMS key ID, alias, or ARN for uploaded latest.tag. Empty uses VULCAN_ARTIFACT_KMS_KEY_ID from the selected environment.
        required: false
        default: ""
        type: string

permissions:
  contents: read
  id-token: write

jobs:
  update-latest:
    name: Update Vulcan latest tag
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment_name }}
    env:
      AWS_REGION: ${{ inputs.aws_region }}
      ARTIFACT_BUCKET: ${{ inputs.bucket || vars.VULCAN_ARTIFACT_BUCKET }}
      ARTIFACT_FOLDER_INPUT: ${{ inputs.artifact_folder }}
      LATEST_TAG_INPUT: ${{ inputs.latest_tag }}
      VALIDATE_MANIFEST: ${{ inputs.validate_manifest }}
      SSE_KMS_KEY_ID: ${{ inputs.sse_kms_key_id || vars.VULCAN_ARTIFACT_KMS_KEY_ID }}

    steps:
      - name: Resolve Vulcan config location
        id: config-location
        shell: bash
        env:
          INPUT_ENVIRONMENT_NAME: ${{ inputs.environment_name }}
          INPUT_BUCKET: ${{ inputs.bucket }}
          INPUT_ROLE_TO_ASSUME: ${{ inputs.role_to_assume }}
          INPUT_SSE_KMS_KEY_ID: ${{ inputs.sse_kms_key_id }}
          VAR_BUCKET: ${{ vars.VULCAN_ARTIFACT_BUCKET }}
          VAR_ROLE_TO_ASSUME: ${{ vars.VULCAN_ARTIFACT_PUBLISHER_ROLE_ARN }}
          VAR_SSE_KMS_KEY_ID: ${{ vars.VULCAN_ARTIFACT_KMS_KEY_ID }}
          VAR_CONFIG_S3_URI: ${{ vars.VULCAN_CONFIG_S3_URI }}
          VAR_CONFIG_READER_ROLE_ARN: ${{ vars.VULCAN_CONFIG_READER_ROLE_ARN }}
        run: |
          set -euo pipefail

          env_name="${INPUT_ENVIRONMENT_NAME:-dev}"
          case "${env_name}" in
            dev)
              config_env="dev"
              default_config_s3_uri="s3://sima-neat-vulcan-config-dev/_vulcan/github-actions/environment.json"
              default_reader_role_arn="arn:aws:iam::990858070801:role/NeatDevVulcanConfigReaderRole"
              ;;
            stg|staging)
              config_env="stg"
              default_config_s3_uri="s3://sima-neat-vulcan-config-staging/_vulcan/github-actions/environment.json"
              default_reader_role_arn="arn:aws:iam::987569578021:role/NeatStagingVulcanConfigReaderRole"
              ;;
            prod|production)
              config_env="prod"
              default_config_s3_uri="s3://sima-neat-vulcan-config-production/_vulcan/github-actions/environment.json"
              default_reader_role_arn="arn:aws:iam::${{ vars.VULCAN_PROD_AWS_ACCOUNT_ID }}:role/NeatProductionVulcanConfigReaderRole"
              ;;
            *)
              echo "Unsupported Vulcan environment: ${env_name}" >&2
              exit 1
              ;;
          esac

          bucket="${INPUT_BUCKET:-${VAR_BUCKET:-}}"
          role_to_assume="${INPUT_ROLE_TO_ASSUME:-${VAR_ROLE_TO_ASSUME:-}}"
          sse_kms_key_id="${INPUT_SSE_KMS_KEY_ID:-${VAR_SSE_KMS_KEY_ID:-}}"
          needs_config=false
          if [[ -z "${bucket}" || -z "${role_to_assume}" || -z "${sse_kms_key_id}" ]]; then
            needs_config=true
          fi

          config_s3_uri="${VAR_CONFIG_S3_URI:-${default_config_s3_uri}}"
          reader_role_arn="${VAR_CONFIG_READER_ROLE_ARN:-${default_reader_role_arn}}"
          if [[ "${needs_config}" == "true" && ( -z "${reader_role_arn}" || "${reader_role_arn}" == *":::"* ) ]]; then
            echo "Missing config reader role ARN for Vulcan environment '${config_env}'." >&2
            exit 1
          fi

          {
            echo "config_env=${config_env}"
            echo "config_s3_uri=${config_s3_uri}"
            echo "reader_role_arn=${reader_role_arn}"
            echo "needs_config=${needs_config}"
            echo "bucket=${bucket}"
            echo "role_to_assume=${role_to_assume}"
            echo "sse_kms_key_id=${sse_kms_key_id}"
          } >> "${GITHUB_OUTPUT}"

      - name: Configure AWS credentials for Vulcan config
        if: ${{ steps.config-location.outputs.needs_config == 'true' }}
        uses: aws-actions/configure-aws-credentials@v6
        with:
          aws-region: ${{ inputs.aws_region }}
          role-to-assume: ${{ steps.config-location.outputs.reader_role_arn }}
          role-session-name: vulcan-config-${{ github.run_id }}

      - name: Resolve Vulcan latest-tag settings
        id: latest-settings
        shell: bash
        env:
          INPUT_AWS_REGION: ${{ inputs.aws_region }}
          CONFIG_ENV: ${{ steps.config-location.outputs.config_env }}
          CONFIG_S3_URI: ${{ steps.config-location.outputs.config_s3_uri }}
          NEEDS_CONFIG: ${{ steps.config-location.outputs.needs_config }}
          EXISTING_BUCKET: ${{ steps.config-location.outputs.bucket }}
          EXISTING_ROLE_TO_ASSUME: ${{ steps.config-location.outputs.role_to_assume }}
          EXISTING_SSE_KMS_KEY_ID: ${{ steps.config-location.outputs.sse_kms_key_id }}
        run: |
          set -euo pipefail

          aws_region="${INPUT_AWS_REGION:-us-west-2}"
          bucket="${EXISTING_BUCKET}"
          role_to_assume="${EXISTING_ROLE_TO_ASSUME}"
          sse_kms_key_id="${EXISTING_SSE_KMS_KEY_ID}"

          if [[ "${NEEDS_CONFIG}" == "true" ]]; then
            config_file="$(mktemp)"
            aws s3 cp "${CONFIG_S3_URI}" "${config_file}" --only-show-errors
            jq -e . "${config_file}" >/dev/null

            config_env="$(jq -r '.environment // empty' "${config_file}")"
            case "${config_env}:${CONFIG_ENV}" in
              :*|dev:dev|stg:stg|staging:stg|prod:prod|production:prod)
                ;;
              *)
                echo "Config environment '${config_env}' does not match requested environment '${CONFIG_ENV}'." >&2
                exit 1
                ;;
            esac

            aws_region="${aws_region:-$(jq -r '.aws_region // empty' "${config_file}")}"
            bucket="${bucket:-$(jq -r '.artifacts.bucket // empty' "${config_file}")}"
            role_to_assume="${role_to_assume:-$(jq -r '.artifacts.publisher_role_arn // empty' "${config_file}")}"
            sse_kms_key_id="${sse_kms_key_id:-$(jq -r '.artifacts.kms_key_id // empty' "${config_file}")}"
          fi

          for required in aws_region bucket role_to_assume; do
            if [[ -z "${!required:-}" ]]; then
              echo "Missing required Vulcan latest-tag setting: ${required}" >&2
              exit 1
            fi
          done

          {
            echo "aws_region=${aws_region}"
            echo "bucket=${bucket}"
            echo "role_to_assume=${role_to_assume}"
            echo "sse_kms_key_id=${sse_kms_key_id}"
          } >> "${GITHUB_OUTPUT}"
          {
            echo "AWS_REGION=${aws_region}"
            echo "ARTIFACT_BUCKET=${bucket}"
            echo "SSE_KMS_KEY_ID=${sse_kms_key_id}"
          } >> "${GITHUB_ENV}"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          aws-region: ${{ steps.latest-settings.outputs.aws_region }}
          role-to-assume: ${{ steps.latest-settings.outputs.role_to_assume }}
          role-session-name: vulcan-latest-${{ github.run_id }}

      - name: Install aws cli tooling
        if: ${{ inputs.install_awscli }}
        run: |
          set -euo pipefail
          case "$(uname -m)" in
            x86_64) aws_arch="x86_64" ;;
            aarch64|arm64) aws_arch="aarch64" ;;
            *) echo "Unsupported architecture for AWS CLI v2: $(uname -m)" >&2; exit 1 ;;
          esac

          tmpdir="$(mktemp -d)"
          trap 'rm -rf "$tmpdir"' EXIT
          curl -fsSL "https://awscli.amazonaws.com/awscli-exe-linux-${aws_arch}.zip" -o "$tmpdir/awscliv2.zip"
          python3 -m zipfile -e "$tmpdir/awscliv2.zip" "$tmpdir"

          install_dir="${HOME}/.local/aws-cli"
          bin_dir="${HOME}/.local/bin"
          mkdir -p "$bin_dir"

          install_args=(-i "$install_dir" -b "$bin_dir")
          if [[ -x "$bin_dir/aws" ]]; then
            install_args+=(--update)
          fi
          "$tmpdir/aws/install" "${install_args[@]}"

          echo "$bin_dir" >> "$GITHUB_PATH"
          "$bin_dir/aws" --version

      - name: Verify aws cli is available
        if: ${{ !inputs.install_awscli }}
        run: |
          set -euo pipefail
          aws --version
          for key in ARTIFACT_BUCKET; do
            if [[ -z "${!key:-}" ]]; then
              echo "Missing required ${key}. Set the input or environment variable." >&2
              exit 1
            fi
          done

      - name: Update latest.tag
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import os
          import re
          import subprocess
          from pathlib import Path
          from urllib.parse import quote

          def clean_path_part(raw: str, fallback: str) -> str:
              value = raw.strip() or fallback
              value = value.replace("/", "-")
              value = re.sub(r"[^A-Za-z0-9._-]+", "-", value)
              value = re.sub(r"-+", "-", value).strip(".-")
              if not value:
                  raise SystemExit(f"Invalid path component: {raw!r}")
              return value

          def branch_key(raw: str) -> str:
              value = raw.strip()
              if not value:
                  raise SystemExit("Branch name is empty.")
              return quote(value, safe="")

          def run(*args: str) -> None:
              print("+", " ".join(args), flush=True)
              subprocess.run(args, check=True)

          def s3_cp_args() -> list[str]:
              args = ["--sse", "aws:kms"]
              key_id = os.environ.get("SSE_KMS_KEY_ID", "").strip()
              if key_id:
                  args.extend(["--sse-kms-key-id", key_id])
              return args

          def artifact_folder_key(raw: str) -> str:
              value = raw.strip()
              if value in {"", ".", "./"}:
                  return ""
              return clean_path_part(value, "artifacts")

          github_repo = os.environ["GITHUB_REPOSITORY"]
          _, repo_name_from_context = github_repo.split("/", 1)
          repo_name = clean_path_part(repo_name_from_context, "repository")
          branch_raw = (
              os.environ.get("GITHUB_HEAD_REF")
              or os.environ["GITHUB_REF_NAME"]
          )
          encoded_branch_key = branch_key(branch_raw)
          artifact_folder = artifact_folder_key(os.environ["ARTIFACT_FOLDER_INPUT"])
          latest_tag = os.environ["LATEST_TAG_INPUT"].strip() or os.environ["GITHUB_SHA"][:12]

          out = Path("_vulcan/latest.tag")
          out.parent.mkdir(parents=True, exist_ok=True)
          out.write_text(latest_tag + "\n", encoding="utf-8")

          bucket = os.environ["ARTIFACT_BUCKET"]
          artifact_prefix_parts = [repo_name, encoded_branch_key, latest_tag]
          if artifact_folder:
              artifact_prefix_parts.append(artifact_folder)
          artifact_prefix = "/".join(artifact_prefix_parts)
          if os.environ["VALIDATE_MANIFEST"].lower() == "true":
              run(
                  "aws", "s3api", "head-object",
                  "--bucket", bucket,
                  "--key", f"{artifact_prefix}/manifest.json",
              )

          key = f"{repo_name}/{encoded_branch_key}/latest.tag"
          run(
              "aws", "s3", "cp", str(out), f"s3://{bucket}/{key}",
              "--content-type", "text/plain",
              "--cache-control", "no-store",
              *s3_cp_args(),
          )
          print(f"latest_tag={latest_tag}")
          print(f"latest_artifact_prefix=s3://{bucket}/{artifact_prefix}/")
          print(f"latest_tag_s3=s3://{bucket}/{key}")
          PY
